<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numera Admin</title>
    <style>
        body { font-family: monospace; background: #222; color: #eee; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { border-bottom: 1px solid #444; padding-bottom: 10px; }
        .game-row { display: flex; justify-content: space-between; align-items: center; background: #333; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .game-title { font-size: 1.2rem; font-weight: bold; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-publish { background: #4CAF50; color: white; }
        .btn-unpublish { background: #f44336; color: white; }
    </style>
</head>
<body>

    <h1>Numera Parent Portal</h1>
    <div id="admin-list">Loading games...</div>

    <script>
        async function loadAdminGames() {
            const res = await fetch('/api/admin/games');
            const games = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = '';

            games.forEach(game => {
                const row = document.createElement('div');
                row.className = 'game-row';
                
                const btnClass = game.is_published ? 'btn-unpublish' : 'btn-publish';
                const btnText = game.is_published ? 'Unpublish' : 'Publish to Numera';

                row.innerHTML = `
                    <div class="game-title">${game.title}</div>
                    <button class="${btnClass}" onclick="togglePublish('${game.id}')">${btnText}</button>
                `;
                list.appendChild(row);
            });
        }

        async function togglePublish(gameId) {
            await fetch(`/api/admin/games/${gameId}/toggle-publish`, { method: 'POST' });
            loadAdminGames(); // Reload the list to show updated state
        }

        loadAdminGames();
    </script>
</body>
</html>
