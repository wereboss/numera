<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numera: Tiny Numbers, Big Smiles</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎈</text></svg>">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <h1>Numera 🎈</h1>
    
    <div class="mode-toggle-container">
        <button id="toggle-digital" class="mode-tab active" onclick="setMode('digital')">📱 Play on Screen</button>
        <button id="toggle-companion" class="mode-tab" onclick="setMode('companion')">🧸 Play in Room</button>
    </div>

    <div class="grid" id="game-grid">
        <div class="empty-state">Loading toys...</div>
    </div>

    <div id="active-game-container" style="display: none;">
        <button class="close-btn" onclick="exitGame()">×</button>
        <div id="game-canvas"></div>
    </div>

    <script src="/static/js/games/template_a.js"></script>
    <script src="/static/js/games/template_b.js"></script>
    <script src="/static/js/games/template_c.js"></script>
    <script src="/static/js/games/template_d.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
