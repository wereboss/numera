<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numera: Tiny Numbers, Big Smiles</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff; /* Soft baby blue */
            margin: 0;
            padding: 20px;
            text-align: center;
            touch-action: manipulation; /* Prevents double-tap zooming */
        }
        h1 { color: #333; font-size: 2.5rem; margin-bottom: 30px; }
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .card {
            background: white;
            border: 5px solid #4CAF50; /* Cheerful green */
            border-radius: 20px;
            padding: 40px 20px;
            width: 200px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.1s ease;
        }
        .card:active { transform: scale(0.95); } /* Tactile feedback on tap */
        .card h2 { font-size: 1.8rem; margin: 0; color: #555; pointer-events: none; }
        .empty-state { color: #888; font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>Numera 🎈</h1>
    <div class="grid" id="game-grid">
        <div class="empty-state">Loading toys...</div>
    </div>

    <script>
        async function loadGames() {
            try {
                const res = await fetch('/api/games/published');
                const games = await res.json();
                const grid = document.getElementById('game-grid');
                grid.innerHTML = '';

                if (games.length === 0) {
                    grid.innerHTML = '<div class="empty-state">Ask your parents to add games!</div>';
                    return;
                }

                games.forEach(game => {
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.innerHTML = `<h2>${game.title}</h2>`;
                    // Phase 2 placeholder:
                    el.onclick = () => alert(`Opening ${game.title}... (We will build this in Phase 2!)`);
                    grid.appendChild(el);
                });
            } catch (error) {
                console.error("Failed to load games:", error);
            }
        }

        loadGames();
    </script>
</body>
</html>
